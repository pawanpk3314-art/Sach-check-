<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SachCheck - AI + Live News</title>
    <style>
        /* SachCheck डार्क थीम */
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: #0a192f; color: white; padding-bottom: 20px; }
        
        /* Header */
        .header { background: #112240; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #233554; position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 20px; }
        .logo-icon { background: #1a73e8; padding: 5px 8px; border-radius: 8px; font-size: 16px; }

        /* Search/Verify Card */
        .verify-card { background: #112240; margin: 15px; padding: 20px; border-radius: 12px; border-left: 5px solid #4caf50; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-label { color: #4caf50; font-size: 13px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .input-area { position: relative; margin-bottom: 15px; }
        .claim-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #233554; color: white; font-size: 18px; padding: 10px 40px 10px 0; outline: none; min-height: 40px; }
        
        /* Google Lens (Camera Icon) */
        .lens-btn { position: absolute; right: 0; top: 10px; cursor: pointer; font-size: 20px; opacity: 0.7; }
        #photo-upload-input { display: none; margin-top: 10px; padding: 10px; border: 1px dashed #4caf50; border-radius: 8px; text-align: center; background: #1a2a41; }

        /* Green Button */
        .btn-verify { background: #4caf50; color: white; width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; }

        /* News Feed Section */
        .section-title { padding: 10px 20px; display: flex; align-items: center; gap: 10px; color: #64ffda; font-size: 18px; font-weight: bold; }
        .news-feed { padding: 15px; }
        .news-card { background: #112240; border-radius: 15px; margin-bottom: 20px; overflow: hidden; border: 1px solid #233554; transition: 0.3s; }
        
        .news-img-container { position: relative; width: 100%; height: 200px; }
        .news-img { width: 100%; height: 100%; object-fit: cover; }
        .source-tag { position: absolute; bottom: 10px; left: 10px; background: #1a73e8; color: white; padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; }

        .news-text { padding: 15px; }
        .news-headline { font-size: 17px; font-weight: bold; color: #ccd6f6; line-height: 1.4; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <span class="logo-icon">🛡️</span>
        <span>SachCheck <small style="font-size:10px; display:block; opacity:0.6;">AI + Live News • सच की जाँच</small></span>
    </div>
    <div style="font-size: 20px; opacity: 0.6;">🕒</div>
</div>

<div class="verify-card">
    <span class="card-label">📅 दावा जाँचें / Verify a Claim</span>
    
    <div class="input-area">
        <input type="text" id="claimInput" class="claim-input" placeholder="Aaj kya hua..." onkeyup="searchClaims()">
        <span class="lens-btn" onclick="toggleLens()">📷</span>
    </div>

    <div id="photo-upload-input" class="hidden">
        <p style="font-size: 11px; margin-bottom: 8px;">सत्यता जाँचने के लिए फोटो अपलोड करें</p>
        <input type="file" style="font-size: 12px; color: #8892b0;">
    </div>

    <button class="btn-verify" onclick="searchClaims()">🛡️ Verify Claim</button>
</div>

<div class="section-title">
    <span style="background:#1a2a41; padding:8px; border-radius:50%;">📰</span> ताज़ा समाचार / Latest News
</div>

<div class="news-feed" id="newsContainer">

        <div class="news-img-container">
            <span class="source-tag">Times of India</span>
            <img class="news-img" src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=500">

        </div>
    </div>
