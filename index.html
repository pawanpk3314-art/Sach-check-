<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SachCheck AI</title>
    <style>
        body { background-color: #0d1b2a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; }
        .card { background: #1b263b; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #415a77; }
        .verify-btn { background: #1b263b; color: white; border: 1px solid #415a77; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .lens-btn { background: #4285F4; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        textarea { width: 100%; height: 100px; background: transparent; border: none; color: white; outline: none; resize: none; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛡️ SachCheck</h2>
        <div class="card">
            <h4>📋 दावा जाँचें / Verify Claim</h4>
            <textarea id="claimInput" placeholder="यहाँ खबर लिखें..."></textarea>
        </div>
        <div class="card">
            <h4>📸 फोटो की सच्चाई</h4>
            <button class="lens-btn" onclick="window.open('https://lens.google.com/upload')">🔍 Google Lens</button>
        </div>
        <button class="verify-btn" onclick="verifyClaim()">🛡️ Verify with AI</button>
    </div>

    <script>
        async function verifyClaim() {
            const claim = document.getElementById('claimInput').value;
            const btn = document.querySelector('.verify-btn');
            if (!claim) { alert("कृपया पहले कुछ लिखें!"); return; }
            btn.innerText = "🔄 AI जाँच कर रहा है...";
            setTimeout(() => {
                window.open(`https://www.google.com/search?q=fact+check+${encodeURIComponent(claim)}`);
                btn.innerText = "🛡️ Verify with AI";
            }, 1000);
        }
    </script>
</body>
</html>
