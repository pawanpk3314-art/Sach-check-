<script>
// ... पुराने फंक्शन वैसा ही ...

// नया: Grok से असली चेक
async function grokFactCheck(query) {
    const GROK_API_KEY = "YOUR_GROK_API_KEY_HERE"; // xAI से लें

    try {
        const response = await fetch("https://api.x.ai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${GROK_API_KEY}`
            },
            body: JSON.stringify({
                model: "grok-beta",
                messages: [
                    { 
                        role: "system", 
                        content: "तुम एक तेज़ हिंदी फैक्ट-चेकर हो। हर दावे को 'सत्य', 'असत्य' या 'अनिश्चित' कहो। स्पष्ट स्पष्टीकरण दो, और अगर संभव हो तो स्रोत बताओ।" 
                    },
                    { role: "user", content: query }
                ],
                max_tokens: 250,
                temperature: 0.6
            })
        });

        if (!response.ok) throw new Error("API एरर");
        const data = await response.json();
        return data.choices[0].message.content.trim();
    } catch (e) {
        return "⚠️ Grok से कनेक्ट नहीं हो पाया। API की चेक करें।";
    }
}

// अपडेटेड runCheck: Grok यूज़ करे
async function runCheck() {
    let input = document.getElementById("userInput").value.trim();
    if(!input || input.length < 5) { 
        alert("❌ कृपया कम से कम 5 अक्षर लिखें!"); 
        return; 
    }

    let resultBox = document.getElementById("resultBox");
    let badge = document.getElementById("statusBadge");
    let bar = document.getElementById("progressBar");
    let analysis = document.getElementById("resAnalysis");
    let btn = document.getElementById("checkBtn");

    resultBox.style.display = "block";
    badge.innerText = "🔍 Grok जांच कर रहा है...";
    badge.style.background = "#1c3a57";
    bar.style.width = "30%";
    btn.disabled = true;
    btn.innerText = "जांच जारी है...";

    const grokResponse = await grokFactCheck(input);

    // रिजल्ट को प्रोसेस करो (सिंपल: अगर 'सत्य' शब्द है तो ग्रीन, वरना रेड)
    const isTrue = grokResponse.includes("सत्य") || grokResponse.includes("पुष्टि");
    const score = isTrue ? 85 : 40;

    setTimeout(() => {
        updateUI(score, grokResponse);
        bar.style.width = score + "%";
    }, 1500);

    btn.disabled = false;
    btn.innerText = "🛡️ दावा जांचें";
}

// नया: समाचार खोज बटन अब Grok यूज़ करेगा
function externalSearch(site) {
    let q = document.getElementById("userInput").value.trim();
    if(!q) {
        alert("❌ पहले दावा लिखें!");
        return;
    }
    
    if (site === 'news') {
        // अब Grok से चेक करो
        document.getElementById("userInput").value = q; // पहले से भरा है
        runCheck(); // Grok चेक ट्रिगर
    } else {
        // Google वाला पुराना
        window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}`, '_blank');
    }
}

// ... बाकी कोड वैसा ही ...
</script>
