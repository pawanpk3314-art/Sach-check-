<script>

function calculateScore(text){
    let score = 75;

    const riskyWords = [
        "viral","100%","breaking","secret",
        "चमत्कार","गारंटी","तुरंत","shocking"
    ];

    riskyWords.forEach(word=>{
        if(text.toLowerCase().includes(word)){
            score -= 15;
        }
    });

    if(text.length < 20){
        score -= 10;
    }

    return Math.max(20, Math.min(score,95));
}

function universalVerify(){

    let input = document.getElementById("userInput").value.trim();
    if(input === ""){
        alert("कृपया कुछ टाइप करें!");
        return;
    }

    let section = document.getElementById("resultSection");
    let badge = document.getElementById("badge");
    let analysis = document.getElementById("analysisText");
    let bar = document.getElementById("bar");
    let title = document.getElementById("displayTitle");

    section.style.display = "block";
    section.style.borderLeft = "6px solid #38bdf8"; // loading color

    badge.innerText = "⏳ विश्लेषण जारी है...";
    badge.style.background = "#38bdf8";
    bar.style.width = "0%";

    title.innerText = "विश्लेषण: " + input;

    setTimeout(() => {

        let score = calculateScore(input);
        bar.style.width = score + "%";

        if(score >= 65){
            badge.innerText = "✅ LIKELY CREDIBLE";
            badge.style.background = "#3fbf63";
            bar.style.background = "#3fbf63";
            section.style.borderLeft = "6px solid #3fbf63";

            analysis.innerText =
            "भाषाई विश्लेषण के आधार पर यह दावा विश्वसनीय प्रतीत होता है। फिर भी आधिकारिक स्रोतों से पुष्टि करना उचित है।";
        }
        else if(score >= 45){
            badge.innerText = "⚠️ NEEDS VERIFICATION";
            badge.style.background = "#facc15";
            bar.style.background = "#facc15";
            section.style.borderLeft = "6px solid #facc15";

            analysis.innerText =
            "इस दावे की स्वतंत्र पुष्टि उपलब्ध नहीं है। साझा करने से पहले अतिरिक्त स्रोतों की जाँच करें।";
        }
        else{
            badge.innerText = "🚨 HIGH RISK / SUSPICIOUS";
            badge.style.background = "#ef4444";
            bar.style.background = "#ef4444";
            section.style.borderLeft = "6px solid #ef4444";

            analysis.innerText =
            "यह दावा अतिरंजित या भ्रामक हो सकता है। विश्वसनीय समाचार स्रोतों से सत्यापन आवश्यक है।";
        }

    }, 800);
}

function externalSearch(p){
    let q = document.getElementById("userInput").value;
    let url = p === 'google'
        ? 'https://google.com/search?q='
        : 'https://twitter.com/search?q=';

    window.open(url + encodeURIComponent(q), "_blank");
}

</script>
