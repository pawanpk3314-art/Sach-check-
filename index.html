<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SachCheck - Deep AI Evidence</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0a192f; color: white; overflow-x: hidden; }
        .header { background: #112240; padding: 15px; border-bottom: 1px solid #233554; font-weight: bold; font-size: 18px; }
        
        /* Search Card */
        .card { background: #112240; margin: 15px; padding: 20px; border-radius: 12px; border-left: 5px solid #4caf50; }
        .input-box { width: 100%; background: transparent; border: none; border-bottom: 1px solid #233554; color: white; font-size: 18px; padding: 10px 0; outline: none; margin-bottom: 15px; }
        .btn-verify { background: #4caf50; color: white; width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-verify:active { transform: scale(0.98); }

        /* Scanning Section */
        #scan-area { display: none; text-align: center; padding: 40px 20px; }
        .scan-img { width: 150px; height: 150px; border-radius: 12px; border: 2px solid #64ffda; object-fit: cover; margin-bottom: 20px; }
        .log-text { font-family: 'Courier New', monospace; color: #64ffda; font-size: 14px; height: 20px; }

        /* Result & Evidence */
        #result-area { display: none; margin: 15px; }
        .tag-fake { background: #e74c3c; display: inline-block; padding: 8px 20px; border-radius: 5px; font-weight: bold; margin-bottom: 15px; }
        .report-box { background: #1a2a41; padding: 20px; border-radius: 15px; border: 1px solid #233554; }
        
        /* Sources Section (तथ्यों के स्रोत) */
        .sources-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .source-item { background: #112240; border-radius: 8px; overflow: hidden; border: 1px solid #233554; padding-bottom: 10px; }
        .source-img { width: 100%; height: 80px; object-fit: cover; }
        .source-label { font-size: 10px; padding: 5px; color: #1a73e8; font-weight: bold; text-align: center; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">🛡️ SachCheck</div>

<div id="home-ui" class="card">
    <div style="color: #4caf50; font-size: 12px; font-weight: bold; margin-bottom: 10px;">📅 दावा जाँचें / Verify a Claim</div>
    <input type="text" id="userInput" class="input-box" placeholder="जैसे: मोदी की डिग्री असली है या नकली?">
    <button class="btn-verify" onclick="runDeepSearch()">🛡️ Verify Claim</button>
</div>

<div id="scan-area">
    <img id="active-img" class="scan-img" src="https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=300">
    <div id="active-log" class="log-text">Initializing AI Scan...</div>
</div>

<div id="result-area">
    <div class="report-box">
        <div class="tag-fake">🚨 FAKE / MISLEADING</div>
        <h2 style="margin: 5px 0;">विश्लेषण रिपोर्ट</h2>
        <p style="font-size: 14px; opacity: 0.8; line-height: 1.6;">
            हमारी गहन AI जाँच में इस दावे के पक्ष में कोई ठोस दस्तावेज़ नहीं मिले हैं। इंटरनेट पर मौजूद न्यूज़ आर्काइव्स और आधिकारिक बयानों के आधार पर यह जानकारी भ्रामक पाई गई है।
        </p>

        <hr style="border: 0; border-top: 1px solid #233554;
