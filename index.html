<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SachCheck</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b1622;
    color:white;
}

/* Navbar */
.navbar{
    background:#142a44;
    padding:15px 20px;
    font-size:20px;
    font-weight:bold;
    display:flex;
    align-items:center;
    gap:10px;
}

.container{
    padding:20px;
    max-width:600px;
    margin:auto;
}

/* Verify Card */
.card{
    background:#142a44;
    padding:20px;
    border-radius:18px;
    position:relative;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.card::before{
    content:"";
    position:absolute;
    left:-6px;
    top:0;
    bottom:0;
    width:6px;
    background:#4ade80;
    border-radius:10px;
}

.section-title{
    font-size:18px;
    margin-bottom:15px;
    color:#4ade80;
}

input{
    width:100%;
    padding:14px;
    border-radius:8px;
    border:none;
    background:#0f2236;
    color:white;
    font-size:15px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4ade80;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

/* News Section */
.news-title{
    margin-top:30px;
    font-size:20px;
    color:#38bdf8;
}

.news-card{
    margin-top:15px;
    background:#142a44;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.news-card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.news-content{
    padding:15px;
}

.news-content h3{
    margin:0;
    font-size:18px;
}

.source{
    margin-top:8px;
    color:#60a5fa;
    font-size:14px;
}
</style>
</head>

<body>

<div class="navbar">
🛡️ SachCheck
</div>

<div class="container">

<div class="card">
<div class="section-title">📅 दावा जाँचें / Verify a Claim</div>

<input type="text" placeholder="यहाँ अपना सवाल लिखें...">
<button>🛡️ Verify Claim</button>
</div>

<div class="news-title">📰 ताज़ा समाचार / Latest News</div>

<div class="news-card">
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
<div class="news-content">
<h3>Intel CEO Lip-Bu Tan: I was shocked to find China's Huawei...</h3>
<div class="source">Times of India</div>
</div>
</div>

</div>

</body>
</html>
