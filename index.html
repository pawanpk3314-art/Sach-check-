<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SachCheck</title>
    <style>
        body { background-color: #0d1b2a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; }
        header { text-align: center; margin-bottom: 20px; }
        .card { background: #1b263b; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; background: transparent; border: 1px solid #415a77; color: white; border-radius: 10px; padding: 10px; box-sizing: border-box; }
        .btn { background: #4caf50; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .news-box { background: #1b263b; border-radius: 15px; padding: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ SachCheck</h1>
            <p>AI + Live News • सच की जाँच</p>
        </header>

        <div class="card">
            <label>📑 दावा जाँचें / Verify a Claim</label>
            <textarea placeholder="यहाँ खबर लिखें..."></textarea>
            <button class="btn">✅ Verify Claim</button>
        </div>

        <div class="news-box">
            <h3>📰 ताज़ा समाचार (Latest News)</h3>
            <p>खबरों की सच्चाई यहाँ दिखेगी...</p>
        </div>
    </div>
</body>
</html>
