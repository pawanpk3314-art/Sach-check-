<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SachCheck - Google Lens AI</title>
    <style>
        body { background-color: #0d1b2a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #1b263b; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        .lens-btn { background: #4285F4; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        input[type="file"] { margin: 10px 0; }
    </style>
</head>
<body>
    <h2>🛡️ SachCheck</h2>
    <div class="card">
        <p>📸 फोटो की सच्चाई जांचें (Google Lens)</p>
        <input type="file" id="imageInput" accept="image/*">
        <button class="lens-btn" onclick="searchImage()">🔍 Search with Google Lens</button>
    </div>

    <script>
        function searchImage() {
            const input = document.getElementById('imageInput');
            if (input.files && input.files[0]) {
                alert("अभी यह फीचर डेवलपमेंट में है। जल्द ही यह फोटो को सीधे Google Lens पर भेजेगा!");
                // भविष्य में यहाँ API जुड़ेगी
            } else {
                alert("कृपया पहले एक फोटो चुनें!");
            }
        }
    </script>
</body>
</html>
