<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SachCheck Startup</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b1622;
    color:white;
}

.container{
    padding:20px;
    max-width:600px;
    margin:auto;
}

.card{
    background:#12263a;
    padding:20px;
    border-radius:10px;
}

.section-title{
    font-size:18px;
    margin-bottom:10px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:none;
    margin-bottom:10px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    background:#ef4444;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}

#resultSection{
    display:none;
    margin-top:20px;
    border-left:6px solid #ef4444;
    padding-left:10px;
}

.status-badge{
    display:inline-block;
    padding:5px 12px;
    border-radius:6px;
    font-weight:bold;
    margin-bottom:10px;
}

.progress{
    height:8px;
    background:#0d1f33;
    border-radius:5px;
    margin:15px 0;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    transition:1.2s ease;
    background:#ef4444;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<div class="section-title">🛡️ दावा जाँचें / Verify a Claim</div>

<input type="text" id="userInput" placeholder="यहाँ अपना सवाल लिखें...">
<button onclick="universalVerify()">Verify Claim</button>

<div id="resultSection">
    <div id="badge" class="status-badge">जाँच जारी है...</div>
    <h3 id="displayTitle"></h3>
    <p id="analysisText" style="color:#9fb3c8;"></p>
    <div class="progress"><div id="bar" class="bar"></div></div>

    <button onclick="externalSearch('google')" style="background:#1c3a57;">Google Search</button>
    <button onclick="externalSearch('twitter')" style="background:#1c3a57;">Twitter Proof</button>
</div>
</div>

</div>

<script>
function universalVerify() {

    let input = document.getElementById("userInput").value.trim();
    if(input === "") {
        alert("कृपया कुछ टाइप करें!");
        return;
    }

    let section = document.getElementById("resultSection");
    let badge = document.getElementById("badge");
    let analysis = document.getElementById("analysisText");
    let bar = document.getElementById("bar");

    section.style.display = "block";
    document.getElementById("displayTitle").innerText = "विश्लेषण: " + input;

    let score = Math.floor(Math.random() * 100);

    setTimeout(() => {
        bar.style.width = score + "%";

        if(score > 60){
            badge.innerText = "✅ VERIFIED / TRUE";
            badge.style.background = "#3fbf63";
            bar.style.background = "#3fbf63";
            analysis.innerText = "AI विश्लेषण के अनुसार यह जानकारी विश्वसनीय लग रही है।";
        } else {
            badge.innerText = "🚨 FAKE / SUSPICIOUS";
            badge.style.background = "#ef4444";
            bar.style.background = "#ef4444";
            analysis.innerText = "सावधान! इस दावे के पक्ष में पर्याप्त सबूत नहीं मिले।";
        }
    }, 300);
}

function externalSearch(p) {
    let q = document.getElementById("userInput").value;
    let url = p === 'google'
        ? 'https://google.com/search?q='
        : 'https://twitter.com/search?q=';

    window.open(url + encodeURIComponent(q), "_blank");
}
</script>

</body>
</html>
