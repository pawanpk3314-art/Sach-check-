<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SachCheck Startup</title>

<style>
:root{
 --bg:#0f172a;
 --card:#1e293b;
 --accent:#38bdf8;
 --red:#ef4444;
 --green:#22c55e;
 --gold:#facc15;
}

body{
 margin:0;
 font-family:'Segoe UI',sans-serif;
 background:var(--bg);
 color:white;
 padding:15px;
}

.header{
 text-align:center;
 padding:25px;
 background:var(--card);
 border-radius:20px;
 margin-bottom:20px;
}

.badge{
 padding:5px 12px;
 border-radius:20px;
 font-size:12px;
 font-weight:bold;
}

.free{ background:#334155; }
.premium{ background:var(--gold); color:black; }

.card{
 background:var(--card);
 padding:20px;
 border-radius:20px;
 margin-bottom:20px;
}

button{
 padding:10px 20px;
 border:none;
 border-radius:20px;
 background:var(--accent);
 color:white;
 cursor:pointer;
 margin-top:10px;
 font-weight:bold;
}

.status{
 padding:6px 15px;
 border-radius:20px;
 display:inline-block;
 margin-bottom:10px;
 font-weight:bold;
 font-size:13px;
}

.fake{ background:var(--red); }
.true{ background:var(--green); }

.progress{
 height:15px;
 background:#334155;
 border-radius:10px;
 margin-top:10px;
 overflow:hidden;
 display:none;
}

.progress-bar{
 height:100%;
 width:0%;
 background:var(--green);
 transition:1s;
}

.hidden{ display:none; }
.small{ font-size:12px; color:#94a3b8; }
</style>
</head>

<body onload="initApp()">

<div class="header">
<h1>🛡️ SachCheck</h1>
<p>AI Fact Verification Platform</p>
<div id="user-badge" class="badge free">FREE USER</div>
<br>
<button onclick="upgradeUser()">Upgrade to Premium 🚀</button>
</div>

<div class="card">
<div id="status" class="status fake">FAKE</div>
<h2 id="claim">Loading...</h2>
<p id="analysis"></p>

<div id="premium-box" class="hidden">
<h3>📊 Truth Probability</h3>
<div class="progress">
<div class="progress-bar" id="progress-bar"></div>
</div>
<p class="small">Advanced AI confidence score</p>
</div>
</div>

<script>

let userTier = "free";

const claims = [
{
status:"fake",
title:"दावा: सोशल मीडिया पर वायरल खबर सच है?",
analysis:"यह दावा भ्रामक पाया गया है।"
},
{
status:"true",
title:"दावा: AI इंडस्ट्री तेजी से बढ़ रही है?",
analysis:"AI सेक्टर में बड़े स्तर पर निवेश और विकास हो रहा है।"
}
];

function initApp(){
loadClaim();
}

function loadClaim(){
let random = claims[Math.floor(Math.random()*claims.length)];

document.getElementById("status").innerText =
random.status === "true" ? "TRUE" : "FAKE";

document.getElementById("status").className = "status " + random.status;
document.getElementById("claim").innerText = random.title;
document.getElementById("analysis").innerText = random.analysis;

if(userTier === "premium"){
showTruthScore(random.status);
}
}

function upgradeUser(){
let code = prompt("Enter Startup Invite Code:");

if(code === "STARTUP2026"){
userTier = "premium";
document.getElementById("user-badge").innerText = "PREMIUM USER";
document.getElementById("user-badge").className = "badge premium";
document.getElementById("premium-box").classList.remove("hidden");
alert("🚀 Premium Activated!");
loadClaim();
}else if(code !== null){
alert("Invalid Code");
}
}

function showTruthScore(status){
let percent = status === "true" ? 88 : 18;
document.querySelector(".progress").style.display="block";
document.getElementById("progress-bar").style.width = percent + "%";
}

</script>

</body>
</html>
