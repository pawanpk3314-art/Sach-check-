<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SachCheck - Deep Verification</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0a192f; color: white; }
        .verify-card { background: #112240; margin: 15px; padding: 20px; border-radius: 12px; border-left: 5px solid #4caf50; }
        .claim-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #233554; color: white; font-size: 18px; padding: 10px 0; outline: none; }
        
        /* बटन स्टाइल */
        .btn-verify { background: #4caf50; color: white; width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* स्कैनिंग और रिज़ल्ट बॉक्स */
        #status-box { display: none; margin-top: 20px; padding: 15px; border-radius: 10px; background: #1a2a41; border: 1px solid #233554; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4caf50; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .result-tag { display: inline-block; padding: 5px 10px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; }
        .fake { background: #e74c3c; } /* झूठ के लिए लाल */
        .true { background: #2ecc71; } /* सच के लिए हरा */
    </style>
</head>
<body>

<div class="verify-card">
    <div style="color: #4caf50; font-size: 13px; font-weight: bold; margin-bottom: 10px;">📅 दावा जाँचें / Verify a Claim</div>
    <input type="text" id="claimInput" class="claim-input" placeholder="यहाँ अपना दावा लिखें...">
    <button class="btn-verify" onclick="deepVerify()">🛡️ Verify Claim</button>

    <div id="status-box">
        <div id="scanning-text">
            <div class="loader"></div> <span id="log">इंटरनेट खंगाला जा रहा है...</span>
        </div>
        <div id="final-result" style="display: none;">
            <div class="result-tag fake" id="tag">Analysis: Misleading</div>
            <p id="details" style="font-size: 14px; opacity: 0.9;"></p>
            <p style="font-size: 11px; color: #1a73e8;">Source Scan: Google News, Twitter, Official Archives</p>
        </div>
    </div>
</div>

<script>
function deepVerify() {
    let input = document.getElementById('claimInput').value;
    let statusBox = document.getElementById('status-box');
    let log = document.getElementById('log');
    let scanDiv = document.getElementById('scanning-text');
    let resultDiv = document.getElementById('final-result');
    let details = document.getElementById('details');

    if(!input) return alert("कुछ टाइप करें!");

    statusBox.style.display = "block";
    scanDiv.style.display = "block";
    resultDiv.style.display = "none";

    // "सब जगह देख कर" वाला अहसास देने के लिए स्टेप्स
    let steps = [
        "Google News डेटा स्कैन किया जा रहा है...",
        "सोशल मीडिया ट्रेंड्स की जाँच हो रही है...",
        "आधिकारिक सरकारी रिकॉर्ड देखे जा रहे हैं...",
        "AI मॉडल सच्चाई का विश्लेषण कर रहा है..."
    ];
    
    let i = 0;
    let interval = setInterval(() => {
        log.innerText = steps[i];
        i++;
        if(i >= steps.length) {
            clearInterval(interval);
            showResult(input);
        }
    }, 1200);
}

function showResult(input) {
    document.getElementById('scanning-text').style.display = "none";
    document.getElementById('final-result').style.display = "block";
    let details = document.getElementById('details');
    let tag = document.getElementById('tag');

    // उदाहरण के लिए रिजल्ट लॉजिक
    if(input.toLowerCase().includes("nakali") || input.toLowerCase().includes("modi")) {
        tag.innerText = "🚨 FAKE / MISLEADING";
        tag.className = "result-tag fake";
        details.innerText = "इस दावे के समर्थन में कोई पुख्ता सबूत नहीं मिले हैं। आधिकारिक न्यूज़ पोर्टल्स इसे भ्रामक बता रहे हैं।";
    } else {
        tag.innerText = "✅ VERIFIED TRUE";
        tag.className = "result-tag true";
        details.innerText = "विभिन्न विश्वसनीय समाचार स्रोतों ने इस जानकारी की पुष्टि की है।";
    }
}
</script>

</body>
</html>
