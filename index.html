<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SachCheck AI - फेक न्यूज़ चेकर</title>
    <meta name="theme-color" content="#3fbf63">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#0a1428">
    <meta name="apple-mobile-web-app-title" content="SachCheck AI">
    <link rel="manifest" href="/manifest.json">

    <style>
        :root {
            --bg: #0a1428;
            --card: rgba(17,38,61,0.9);
            --accent: #3fbf63;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            color: white; 
            line-height: 1.6;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .hero {
            height: 60vh;
            background: linear-gradient(135deg, #0a1428 0%, #1a2a4a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }
        .logo { font-size: 4rem; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; margin-bottom: 15px; }
        .hero p { font-size: 1.3rem; opacity: 0.9; margin-bottom: 30px; }
        
        .container { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
        .card { 
            background: var(--card); padding: 40px; border-radius: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); backdrop-filter: blur(15px);
        }
        .section-title { font-size: 28px; font-weight: 800; margin-bottom: 30px; color: var(--accent); text-align: center; }
        
        .mega-input { position: relative; width: 100%; margin-bottom: 25px; }
        #userInput {
            width: 100%; padding: 22px 20px; border-radius: 20px; 
            border: 3px dashed var(--accent); background: #0d1f33; 
            color: white; font-size: 18px; transition: all 0.3s;
        }
        #userInput:focus {
            outline: none; border-color: #63d28c; box-shadow: 0 0 0 4px rgba(63,191,99,0.2);
            background: rgba(13,31,51,0.95);
        }
        
        .check-btn {
            width: 100%; padding: 22px; border: none; border-radius: 20px; 
            background: linear-gradient(135deg, var(--accent), #32c768); 
            color: white; font-weight: 800; font-size: 20px; cursor: pointer; 
            transition: all 0.3s; box-shadow: 0 10px 30px rgba(63,191,99,0.4);
        }
        .check-btn:hover:not(:disabled) { 
            transform: translateY(-4px); box-shadow: 0 20px 40px rgba(63,191,99,0.5);
        }
        .check-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        #progress { 
            display: none; height: 12px; background: #0d1f33; border-radius: 8px; 
            margin: 20px 0; overflow: hidden;
        }
        #progressBar { 
            height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #63d28c); 
            transition: width 2.5s ease; border-radius: 8px;
        }
        
        #resultBox { 
            display: none; margin-top: 30px; padding: 30px; 
            border-top: 4px solid var(--accent); background: rgba(63,191,99,0.1);
            border-radius: 20px;
        }
        .result-badge {
            display: inline-block; padding: 15px 25px; border-radius: 30px; 
            font-weight: 800; font-size: 18px; margin-bottom: 20px;
        }
        .true { background: linear-gradient(135deg, #3fbf63, #32c768); }
        .false { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .unknown { background: linear-gradient(135deg, #f59e0b, #d97706); }
    </style>
</head>
<body>
    <section class="hero">
        <div class="logo">🛡️</div>
        <h1>Sach<span style="color: var(--accent);">Check</span> AI</h1>
        <p>फेक न्यूज़ का अंत • 2 सेकंड में सत्य जांच</p>
    </section>

    <div class="container">
        <div class="card">
            <h2 class="section-title">📝 दावा जांचें</h2>
            <div class="mega-input">
                <input type="text" id="userInput" placeholder="यहाँ खबर या दावा लिखें...">
            </div>
            <button class="check-btn" onclick="checkClaim()">🚀 अभी जांचें</button>
            
            <div id="progress">
                <div id="progressBar"></div>
            </div>
            <div id="resultBox"></div>
        </div>
    </div>

    <script>
        async function checkClaim() {
            const text = document.getElementById('userInput').value.trim();
            
            if (!text) {
                alert('कृपया दावा लिखें!');
                return;
            }

            const progress = document.getElementById('progress');
            const bar = document.getElementById('progressBar');
            const btn = document.querySelector('.check-btn');
            progress.style.display = 'block';
            btn.disabled = true;
            btn.textContent = 'जांच रहे हैं...';
            bar.style.width = '0%';

            let width = 0;
            const interval = setInterval(() => {
                width += 2;
                bar.style.width = width + '%';
                if (width >= 100) {
                    clearInterval(interval);
                    showResult(text);
                }
            }, 80);
        }

        async function showResult(text) {
            const result = await realFactCheck(text);

            let badgeClass = 'unknown';
            let badgeText = '⚠️ अनिश्चित';
            let statusText = result.rating || 'कोई फैक्ट-चेक नहीं मिला';

            if (result.isTrue === true) {
                badgeClass = 'true';
                badgeText = '✅ सत्यापित';
            } else if (result.isTrue === false) {
                badgeClass = 'false';
                badgeText = '❌ फर्जी';
            }

            const resultBox = document.getElementById('resultBox');
            resultBox.innerHTML = `
                <div class="result-badge \( {badgeClass}"> \){badgeText}</div>
                <h3 style="color: var(--accent); margin: 15px 0;">परिणाम:</h3>
                <p style="font-size: 18px; margin-bottom: 15px;"><strong>"${text}"</strong></p>
                <p style="font-size: 17px;">${statusText}</p>
                <div style="margin-top: 25px;">
                    <a href="https://www.google.com/search?q=${encodeURIComponent(text + ' fact check hindi')}" target="_blank" 
                       style="background: #6366f1; color: white; padding: 12px 20px; border-radius: 12px; text-decoration: none; display: inline-block;">
                       Google पर और खोजें
                    </a>
                </div>
            `;
            resultBox.style.display = 'block';

            document.getElementById('progress').style.display = 'none';
            document.querySelector('.check-btn').disabled = false;
            document.querySelector('.check-btn').textContent = '🚀 अभी जांचें';
            
            resultBox.scrollIntoView({ behavior: 'smooth' });
        }

        async function realFactCheck(query) {
            try {
                const response = await fetch(`/api/factcheck?query=${encodeURIComponent(query)}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.claims && data.claims.length > 0) {
                    const claim = data.claims[0];
                    const review = claim.claimReview?.[0] || {};
                    const rating = review.textualRating || 'Unknown';

                    let isTrue = null;
                    if (rating.toLowerCase().includes('true') || rating.includes('सही') || rating.includes('सत्य')) {
                        isTrue = true;
                    } else if (rating.toLowerCase().includes('false') || rating.includes('गलत') || rating.includes('फर्जी')) {
                        isTrue = false;
                    }

                    return { isTrue, rating };
                }
                return { isTrue: null, rating: 'कोई फैक्ट-चेक नहीं मिला' };
            } catch (err) {
                console.error('Fact check error:', err);
                return { isTrue: null, rating: 'एरर: ' + err.message };
            }
        }

        // Enter key support
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkClaim();
            }
        });
    </script>
</body>
</html>
