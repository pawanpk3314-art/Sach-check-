<script>
// 1. वो फोटो और टेक्स्ट जो खोज के दौरान दिखेंगे
const steps = [
    { img: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=300", log: "> Google News स्कैन हो रहा है..." },
    { img: "https://images.unsplash.com/photo-1611605698335-8b1569810432?w=300", log: "> Twitter API चेक हो रहा है..." },
    { img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=300", log: "> सरकारी रिकॉर्ड्स देखे जा रहे हैं..." }
];

function startDeepScan() {
    let input = document.getElementById('userInput').value;
    if(!input) return alert("पहले कुछ लिखें!");

    // 2. होम स्क्रीन छुपाओ और स्कैनिंग दिखाओ
    document.getElementById('main-ui').style.display = 'none';
    document.getElementById('scan-screen').style.display = 'block';

    let i = 0;
    let timer = setInterval(() => {
        if(i < steps.length) {
            document.getElementById('active-pic').src = steps[i].img;
            document.getElementById('active-log').innerText = steps[i].log;
            i++;
        } else {
            clearInterval(timer);
            // 3. अंत में वो रिपोर्ट और छोटे फोटो वाले सबूत दिखाओ
            document.getElementById('scan-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
        }
    }, 1200);
}
</script>
